name: Build and Publish PyPI Packages

on:
  push:
    branches:
      - main
    paths:
      - 'arx5_common/**'
      - 'lerobot_robot_arx5/**'
      - 'lerobot_teleoperator_arx5/**'
      - '.github/workflows/publish-pypi.yml'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      arx5_common: ${{ steps.filter.outputs.arx5_common }}
      lerobot_robot_arx5: ${{ steps.filter.outputs.lerobot_robot_arx5 }}
      lerobot_teleoperator_arx5: ${{ steps.filter.outputs.lerobot_teleoperator_arx5 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for change detection
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            arx5_common:
              - 'arx5_common/**'
            lerobot_robot_arx5:
              - 'lerobot_robot_arx5/**'
            lerobot_teleoperator_arx5:
              - 'lerobot_teleoperator_arx5/**'

  build-arx5-common:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.arx5_common == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: arx5_common
        run: |
          python -m build

      - name: Publish to PyPI
        working-directory: arx5_common
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing dist/*

  build-lerobot-robot-arx5:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.lerobot_robot_arx5 == 'true' ||
      needs.detect-changes.outputs.arx5_common == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: lerobot_robot_arx5
        run: |
          python -m build

      - name: Publish to PyPI
        working-directory: lerobot_robot_arx5
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing dist/*

  build-lerobot-teleoperator-arx5:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.lerobot_teleoperator_arx5 == 'true' ||
      needs.detect-changes.outputs.arx5_common == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: lerobot_teleoperator_arx5
        run: |
          python -m build

      - name: Publish to PyPI
        working-directory: lerobot_teleoperator_arx5
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing dist/*

